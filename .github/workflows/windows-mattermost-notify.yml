name: Notify Windows Devs MM channel on Windows PR

on:
    issue_comment:
        types:
            - created
            - edited

jobs:
    notify:
        # Only run on PR comments, not plain issue comments
        if: github.event.issue.pull_request != null
        runs-on: ubuntu-latest

        steps:
            - name: Check approval analysis and notify
              uses: actions/github-script@v8
              env:
                  MM_WEBHOOK_URL: ${{ secrets.MM_WINDOWS_NOTIFY_WEBHOOK_URL }}
              with:
                  script: |
                      const comment = context.payload.comment;

                      // Only process the JSON approval analysis comment from github-actions[bot]
                      if (comment.user.login !== 'github-actions[bot]') {
                          console.log('Not a github-actions[bot] comment, skipping');
                          return;
                      }
                      if (!comment.body.includes('JSON approval analysis')) {
                          console.log('Not an approval analysis comment, skipping');
                          return;
                      }

                      // Check if windows-config.json appears in the Manual Review Required section
                      const manualReviewMatch = comment.body.match(/## ❌ Manual Review Required([\s\S]*?)(?=\n## |$)/);
                      if (!manualReviewMatch || !manualReviewMatch[1].includes('windows-config.json')) {
                          console.log('No Windows config manual review required, skipping');
                          return;
                      }

                      // Check if we already sent a notification for this PR
                      const { data: comments } = await github.rest.issues.listComments({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.payload.issue.number,
                      });

                      const alreadyNotified = comments.some(c =>
                          c.user.login === 'github-actions[bot]' &&
                          c.body.includes('<!-- windows-mm-notified -->')
                      );

                      if (alreadyNotified) {
                          console.log('Notification already sent for this PR, skipping');
                          return;
                      }

                      const webhookUrl = process.env.MM_WEBHOOK_URL;
                      if (!webhookUrl) {
                          core.setFailed('MM_WINDOWS_NOTIFY_WEBHOOK_URL is missing from GHA secrets');
                          return;
                      }

                      // Get PR details
                      const { data: pr } = await github.rest.pulls.get({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          pull_number: context.payload.issue.number,
                      });

                      const text = `:wave: Please review this :windows: Privacy Config PR for ${pr.user.login}:\n[${pr.title} - #${pr.number}](${pr.html_url})`;

                      const response = await fetch(webhookUrl, {
                          method: 'POST',
                          headers: { 'Content-Type': 'application/json' },
                          body: JSON.stringify({ text }),
                      });

                      if (!response.ok) {
                          core.setFailed(`Mattermost webhook returned ${response.status}: ${await response.text()}`);
                          return;
                      }

                      console.log('Mattermost notification sent');

                      // Post a marker comment so we don't notify again for this PR
                      await github.rest.issues.createComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.payload.issue.number,
                          body: '<!-- windows-mm-notified -->\n:bell: Windows team notified via Mattermost.',
                      });
