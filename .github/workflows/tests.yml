name: Test

on:
    push:
    pull_request:
    merge_group:

jobs:
    unit:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - name: Use Node.js 20
              uses: actions/setup-node@v5
              with:
                  node-version: 20.x
            - name: Install dependencies
              run: npm ci
            - uses: ./
            - name: Run tests
              run: npm run test
    lint:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v5
              with:
                  repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
                  ref: ${{ github.event.pull_request.head.ref || github.ref }}
            - name: Use Node.js 20
              uses: actions/setup-node@v5
              with:
                  node-version: 20.x
            - name: Install dependencies
              run: npm ci
            - name: Check or Fix lint
              env:
                  EVENT_NAME: ${{ github.event_name }}
                  HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
                  THIS_REPO: ${{ github.repository }}
              run: |
                  if [[ "$EVENT_NAME" == "pull_request" && "$HEAD_REPO" == "$THIS_REPO" ]]; then
                    npm run lint-fix
                    npm run lint
                  else
                    npm run lint
                  fi
            - name: Commit and push linter fixes (PRs only)
              if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
              env:
                  HEAD_REF: ${{ github.event.pull_request.head.ref }}
                  # Use PAT for pushes so the new commit triggers follow-up PR checks.
                  # Pushes made with the default GITHUB_TOKEN do not trigger new workflow runs.
                  PRIVACY_CONFIG_PAT: ${{ secrets.PRIVACY_CONFIG_PAT }}
              run: |
                  git config --global user.name "github-actions[bot]"
                  git config --global user.email "github-actions[bot]@users.noreply.github.com"
                  git add .
                  if ! git diff --cached --quiet; then
                    git commit -m "chore: auto-fix lint errors"
                    # Push directly with PAT credentials to allow pull_request synchronize checks to rerun.
                    git push "https://x-access-token:${PRIVACY_CONFIG_PAT}@github.com/${{ github.repository }}.git" "HEAD:$HEAD_REF"
                  fi
