name: Enqueue PRs to Merge Queue

on:
    workflow_dispatch:
        inputs:
            pr_numbers:
                description: 'Comma-separated PR numbers to enqueue'
                required: true
    push:
        branches:
            - jkt/auto/enqueue-dependabot-prs-c359

jobs:
    enqueue:
        runs-on: ubuntu-latest
        steps:
            - name: Enqueue pull requests
              env:
                  GH_TOKEN: ${{ secrets.PRIVACY_CONFIG_PAT }}
                  PR_NUMBERS: ${{ inputs.pr_numbers || '5024' }}
              run: |
                  set -euo pipefail
                  IFS=',' read -ra PRS <<< "${PR_NUMBERS// /}"
                  for pr in "${PRS[@]}"; do
                    echo "Processing PR #${pr}..."
                    pr_id=$(gh api graphql -f query='query($n:Int!){repository(owner:"duckduckgo",name:"privacy-configuration"){pullRequest(number:$n){id title mergeable mergeQueueEntry{state}}}}' -F n="${pr}" --jq '.data.repository.pullRequest')
                    pr_node_id=$(echo "$pr_id" | jq -r '.id')
                    pr_title=$(echo "$pr_id" | jq -r '.title')
                    mergeable=$(echo "$pr_id" | jq -r '.mergeable')
                    queue_state=$(echo "$pr_id" | jq -r '.mergeQueueEntry.state // "NOT_QUEUED"')
                    if [ "$mergeable" = "CONFLICTING" ]; then
                      echo "PR #${pr} has merge conflicts, attempting update-branch..."
                      if gh api -X PUT "repos/duckduckgo/privacy-configuration/pulls/${pr}/update-branch" 2>/dev/null; then
                        echo "Updated branch for PR #${pr}, skipping enqueue until CI re-runs"
                        continue
                      else
                        echo "::warning::PR #${pr} has merge conflicts and could not be updated"
                        continue
                      fi
                    fi
                    echo "Enqueuing PR #${pr}..."
                    if [ "$queue_state" != "NOT_QUEUED" ] && [ "$queue_state" != "null" ]; then
                      echo "PR #${pr} (${pr_title}) already in merge queue: ${queue_state}"
                      continue
                    fi
                    if ! result=$(gh api graphql -f query='mutation($id:ID!){enqueuePullRequest(input:{pullRequestId:$id}){mergeQueueEntry{position state}}}' -f id="${pr_node_id}" 2>&1); then
                      if echo "$result" | grep -q 'All comments must be resolved'; then
                        echo "PR #${pr} has unresolved review threads, resolving..."
                        thread_ids=$(gh api graphql -f query='query($n:Int!){repository(owner:"duckduckgo",name:"privacy-configuration"){pullRequest(number:$n){reviewThreads(first:50){nodes{id isResolved}}}}}' -F n="${pr}" --jq '.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved == false) | .id')
                        for thread_id in $thread_ids; do
                          gh api graphql -f query='mutation($id:ID!){resolveReviewThread(input:{threadId:$id}){thread{isResolved}}}' -f id="$thread_id" || true
                        done
                        if result=$(gh api graphql -f query='mutation($id:ID!){enqueuePullRequest(input:{pullRequestId:$id}){mergeQueueEntry{position state}}}' -f id="${pr_node_id}" 2>&1); then
                          echo "Enqueued PR #${pr} (${pr_title}) after resolving threads: ${result}"
                          continue
                        fi
                      fi
                      echo "::warning::Failed to enqueue PR #${pr}: ${result}"
                      continue
                    fi
                    echo "Enqueued PR #${pr} (${pr_title}): ${result}"
                  done
