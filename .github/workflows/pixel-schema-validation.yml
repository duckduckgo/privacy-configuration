name: Experiment Pixel Validation

on:
    pull_request:
        paths:
            - 'overrides/*.json'
            - 'features/content-scope-experiments.json'
            - 'experiment-annotations/*.json'

jobs:
    validate-experiment-annotations:
        runs-on: ubuntu-latest
        permissions:
            pull-requests: write
        steps:
            - name: Checkout PR branch
              uses: actions/checkout@v5
              with:
                  path: head

            - name: Checkout base branch
              uses: actions/checkout@v5
              with:
                  ref: ${{ github.event.pull_request.base.ref }}
                  path: base

            - name: Use Node.js 20
              uses: actions/setup-node@v5
              with:
                  node-version: 20.x
                  cache: 'npm'
                  cache-dependency-path: head/package-lock.json

            - name: Install dependencies
              run: npm ci
              working-directory: head

            - name: Extract experiments from base branch
              id: base_extract
              run: node scripts/extract-experiments.mjs --output /tmp/base-manifest.json
              working-directory: base

            - name: Extract experiments from PR branch
              id: head_extract
              run: node scripts/extract-experiments.mjs --output /tmp/head-manifest.json
              working-directory: head

            - name: Diff experiments
              id: diff
              run: |
                  node scripts/diff-experiments.mjs /tmp/base-manifest.json /tmp/head-manifest.json --output /tmp/diff.json 2>/dev/null || true
                  CHANGES=$(node -e "const d = JSON.parse(require('fs').readFileSync('/tmp/diff.json','utf8')); console.log(d.changes.length)")
                  echo "changes=$CHANGES" >> $GITHUB_OUTPUT
              working-directory: head

            - name: Validate experiment annotations
              id: validate
              run: |
                  node scripts/validate-experiment-annotations.mjs --output /tmp/validation-result.json 2>/dev/null || true
                  ERRORS=$(node -e "const r = JSON.parse(require('fs').readFileSync('/tmp/validation-result.json','utf8')); console.log(r.summary.errors)")
                  WARNINGS=$(node -e "const r = JSON.parse(require('fs').readFileSync('/tmp/validation-result.json','utf8')); console.log(r.summary.warnings)")
                  echo "errors=$ERRORS" >> $GITHUB_OUTPUT
                  echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT
              working-directory: head

            - name: Post PR comment
              uses: actions/github-script@v7
              with:
                  script: |
                      const fs = require('fs');

                      let diffData, validationResult;
                      try {
                        diffData = JSON.parse(fs.readFileSync('/tmp/diff.json', 'utf8'));
                        validationResult = JSON.parse(fs.readFileSync('/tmp/validation-result.json', 'utf8'));
                      } catch (e) {
                        console.log('Could not read result files:', e.message);
                        return;
                      }

                      const errors = validationResult.summary.errors;
                      const warnings = validationResult.summary.warnings;
                      const changes = diffData.changes.length;

                      let body = '## 🔍 Experiment Pixel Validation\n\n';

                      // No changes case
                      if (changes === 0 && errors === 0 && warnings === 0) {
                        body += '✅ No experiment changes detected. All annotations valid.\n';
                      } else {
                        // Diff summary
                        if (changes > 0) {
                          body += `**Experiment changes:** ${diffData.summary.added} added, ${diffData.summary.removed} removed, ${diffData.summary.modified} modified\n\n`;
                          body += '<details><summary>Changed experiments</summary>\n\n';
                          for (const c of diffData.changes) {
                            const icon = c.changeType === 'added' ? '🆕' : c.changeType === 'removed' ? '🗑️' : '🔄';
                            body += `- ${icon} \`${c.platform}/${c.type}\`: **${c.name}** (${c.changeType})\n`;
                          }
                          body += '\n</details>\n\n';
                        }

                        // Validation results
                        if (errors > 0) {
                          body += `❌ **${errors} error(s):**\n\n`;
                          for (const e of validationResult.errors) {
                            body += `- \`${e.platform}\` **${e.experiment}**: ${e.detail}\n`;
                          }
                          body += '\n';
                        }

                        if (warnings > 0) {
                          body += `⚠️ **${warnings} warning(s):**\n\n`;
                          body += '<details><summary>Show warnings</summary>\n\n';
                          for (const w of validationResult.warnings) {
                            body += `- \`${w.platform}\` **${w.experiment}**: ${w.detail}\n`;
                          }
                          body += '\n</details>\n\n';
                        }

                        // Feature impact
                        if (validationResult.impacts.length > 0) {
                          body += '### Feature Impact\n\n';
                          for (const impact of validationResult.impacts) {
                            body += `**${impact.platform}/${impact.experiment}**: ${impact.affectedFeatures.join(', ')}\n`;
                          }
                          body += '\n';
                        }

                        if (errors === 0) {
                          body += '✅ All experiment annotations are valid.\n';
                        } else {
                          body += '> **Action required:** Add missing annotations to `experiment-annotations/` before merging.\n';
                        }
                      }

                      // Find and update or create comment
                      const marker = '## 🔍 Experiment Pixel Validation';
                      const { data: comments } = await github.rest.issues.listComments({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                      });

                      const existing = comments.find(c => c.body?.includes(marker));
                      if (existing) {
                        await github.rest.issues.updateComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          comment_id: existing.id,
                          body,
                        });
                      } else {
                        await github.rest.issues.createComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                          body,
                        });
                      }
