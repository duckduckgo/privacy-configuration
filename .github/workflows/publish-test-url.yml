name: Publish Test URL

on:
    push:
        branches-ignore:
            - main
            - preview-pages
            - 'pr-releases/**'
    delete:

permissions: write-all

jobs:
    publish-config:
        # Only run on push events (not delete)
        if: github.event_name == 'push'
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version-file: '.nvmrc'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - uses: ./

            - name: Build config
              run: npm run build

            - name: Create and push preview branch
              id: create_branch
              env:
                  SOURCE_BRANCH: ${{ github.ref_name }}
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  git config --global user.name "github-actions[bot]"
                  git config --global user.email "github-actions[bot]@users.noreply.github.com"

                  # Preview branch uses the pr-releases/ prefix to avoid ref conflicts.
                  # A branch named "foo" prevents creating "foo/bar" (and vice-versa)
                  # because git refs are a filesystem hierarchy.  pr-releases/ is a
                  # separate namespace that can never collide with the source branch.
                  PREVIEW_BRANCH="pr-releases/${SOURCE_BRANCH}"

                  git checkout -b "${PREVIEW_BRANCH}"
                  git add -f generated
                  git commit -m "Build config for ${SOURCE_BRANCH}"
                  git push -u origin "${PREVIEW_BRANCH}" --force

                  echo "PREVIEW_BRANCH=${PREVIEW_BRANCH}" >> "$GITHUB_ENV"
                  echo "COMMIT_HASH=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

            - name: Generate preview links
              id: generate_preview_links
              env:
                  COMMIT_HASH: ${{ env.COMMIT_HASH }}
              run: |
                  PREVIEW_BASE_URL="https://rawcdn.githack.com/${{ github.repository }}/${COMMIT_HASH}"
                  PREVIEW_LINKS=$(find generated/v4 -type f | sort | while read -r file; do
                    RELATIVE_PATH=${file#generated/v4/}
                    echo "- [${RELATIVE_PATH}](${PREVIEW_BASE_URL}/generated/v4/${RELATIVE_PATH})"
                  done)
                  LAST_UPDATED=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

                  echo "preview_links<<EOF" >> "$GITHUB_OUTPUT"
                  echo "$PREVIEW_LINKS" >> "$GITHUB_OUTPUT"
                  echo "EOF" >> "$GITHUB_OUTPUT"
                  echo "last_updated=$LAST_UPDATED" >> "$GITHUB_OUTPUT"

            - name: Comment on associated PR
              uses: actions/github-script@v9
              env:
                  PREVIEW_BRANCH: ${{ env.PREVIEW_BRANCH }}
                  COMMIT_HASH: ${{ env.COMMIT_HASH }}
                  SOURCE_BRANCH: ${{ github.ref_name }}
                  PREVIEW_LINKS: ${{ steps.generate_preview_links.outputs.preview_links }}
                  LAST_UPDATED: ${{ steps.generate_preview_links.outputs.last_updated }}
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      const previewBranch = process.env.PREVIEW_BRANCH;
                      const commitHash = process.env.COMMIT_HASH;
                      const sourceBranch = process.env.SOURCE_BRANCH;
                      const previewLinks = process.env.PREVIEW_LINKS;
                      const lastUpdated = process.env.LAST_UPDATED;
                      const repoUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}`;
                      const branchUrl = `${repoUrl}/tree/${previewBranch}`;
                      const commitUrl = `${repoUrl}/commit/${commitHash}`;
                      const marker = '<!-- PREVIEW_CONFIG_BRANCH_COMMENT -->';

                      const commentBody = [
                          marker,
                          `### Preview Config`,
                          ``,
                          `| | |`,
                          `|---|---|`,
                          `| **Branch** | [\`${previewBranch}\`](${branchUrl}) |`,
                          `| **Commit** | [\`${commitHash.slice(0, 10)}\`](${commitUrl}) |`,
                          `| **Updated** | ${lastUpdated} |`,
                          ``,
                          `#### Generated config entry points`,
                          ``,
                          previewLinks,
                      ].join('\n');

                      // Find open PRs for this branch.
                      const { data: prs } = await github.rest.pulls.list({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          head: `${context.repo.owner}:${sourceBranch}`,
                          state: 'open',
                      });

                      for (const pr of prs) {
                          // Find existing bot comment by marker.
                          const { data: comments } = await github.rest.issues.listComments({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              issue_number: pr.number,
                          });

                          const botComment = comments.find(
                              c => c.user.login === 'github-actions[bot]' && c.body.includes(marker)
                          );

                          if (botComment) {
                              await github.rest.issues.updateComment({
                                  owner: context.repo.owner,
                                  repo: context.repo.repo,
                                  comment_id: botComment.id,
                                  body: commentBody,
                              });
                              console.log(`Updated preview config comment on PR #${pr.number}`);
                          } else {
                              await github.rest.issues.createComment({
                                  owner: context.repo.owner,
                                  repo: context.repo.repo,
                                  issue_number: pr.number,
                                  body: commentBody,
                              });
                              console.log(`Created preview config comment on PR #${pr.number}`);
                          }
                      }

                      if (prs.length === 0) {
                          console.log(`No open PR found for branch ${sourceBranch} — preview branch pushed but no PR to annotate.`);
                      }

    clean_up:
        # Only run when a branch is deleted, and only for non-pr-releases branches
        if: github.event_name == 'delete' && github.event.ref_type == 'branch' && !startsWith(github.event.ref, 'pr-releases/')
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Delete preview branch
              env:
                  DELETED_BRANCH: ${{ github.event.ref }}
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  git push origin --delete "pr-releases/${DELETED_BRANCH}" || echo "Preview branch pr-releases/${DELETED_BRANCH} not found (may already be deleted)"
