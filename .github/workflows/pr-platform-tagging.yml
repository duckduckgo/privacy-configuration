# PR Platform Tagging Workflow
#
# Compares base vs PR generated configs to detect which platforms are affected
# and applies `platform: X` labels accordingly. Runs independently of the
# diff/approval pipeline so label updates don't block auto-approval.

name: PR Platform Tagging

on:
    pull_request_target:
        types:
            - opened
            - reopened
            - synchronize

jobs:
    tag_platforms:
        runs-on: ubuntu-latest
        concurrency: pr-platform-tagging-${{ github.event.pull_request.number }}

        steps:
            - name: Checkout base branch
              uses: actions/checkout@v5
              with:
                  ref: ${{ github.event.pull_request.base.ref }}
                  repository: ${{ github.event.pull_request.head.repo.full_name }}
                  path: base

            - name: Checkout PR branch
              uses: actions/checkout@v5
              with:
                  ref: ${{ github.event.pull_request.head.ref }}
                  repository: ${{ github.event.pull_request.head.repo.full_name }}
                  path: pr
                  fetch-depth: 0

            - name: Build base branch configs
              run: |
                  cd base
                  npm ci
                  node index.js

            - name: Build PR branch configs
              run: |
                  cd pr
                  git config --global user.email "dax@duck.com"
                  git config --global user.name "dax"
                  git rebase -X theirs origin/${{ github.event.pull_request.base.ref }}
                  npm ci
                  node index.js

            - name: Analyze branch content
              id: content_tags
              uses: actions/github-script@v8
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      const path = await import('node:path');
                      const { pathToFileURL } = await import('node:url');

                      const scriptPath = path.join(process.env.GITHUB_WORKSPACE, 'pr', '.github', 'scripts', 'branch-content-tagging.js');
                      const scriptUrl = pathToFileURL(scriptPath).href;
                      const { runBranchContentTagging } = await import(scriptUrl);
                      const analysis = runBranchContentTagging('base/generated', 'pr/generated');

                      console.log('Platforms:', analysis.platforms.join(', ') || '(none)');
                      console.log('Feature state changes:', analysis.featureChanges.length);

                      core.setOutput('platforms', analysis.platforms.join(','));

            - name: Apply platform labels
              uses: actions/github-script@v8
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      const platforms = '${{ steps.content_tags.outputs.platforms }}'.split(',').filter(Boolean);
                      const labelMap = {
                          windows: 'platform: windows',
                          macos: 'platform: macOS',
                          ios: 'platform: iOS',
                          android: 'platform: android',
                          extension: 'platform: extension',
                      };

                      const labels = platforms.map(p => labelMap[p]).filter(Boolean);

                      const owner = context.repo.owner;
                      const repo = context.repo.repo;

                      for (const label of labels) {
                          try {
                              await github.rest.issues.getLabel({ owner, repo, name: label });
                          } catch {
                              await github.rest.issues.createLabel({
                                  owner, repo, name: label,
                                  color: label.includes('windows') ? '0078D4' :
                                         label.includes('macOS')   ? '999999' :
                                         label.includes('iOS')     ? '000000' :
                                         label.includes('android') ? '3DDC84' :
                                         label.includes('extension') ? 'FF6600' : 'EDEDED',
                              });
                          }
                      }

                      const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
                          owner, repo, issue_number: context.payload.pull_request.number,
                      });
                      const currentPlatformLabels = currentLabels.map(l => l.name).filter(n => n.startsWith('platform: '));

                      const toRemove = currentPlatformLabels.filter(l => !labels.includes(l));
                      for (const label of toRemove) {
                          await github.rest.issues.removeLabel({
                              owner, repo, issue_number: context.payload.pull_request.number, name: label,
                          });
                      }

                      if (labels.length > 0) {
                          await github.rest.issues.addLabels({
                              owner, repo, issue_number: context.payload.pull_request.number, labels,
                          });
                      }

                      console.log(`Applied platform labels: ${labels.join(', ')}`);
