name: Build and Publish

on:
    push:
        branches:
            - main
        paths:
            - '**.json'
            - '**.js'
            - '**.yml'
            - '**.ts' # For schema changes that other repos may rely on.

jobs:
    publish:
        outputs:
            changed-configs: ${{ steps.detect-changed-configs.outputs.changed }}
            version: ${{ steps.version.outputs.version }}
        concurrency:
            group: build-and-publish
            cancel-in-progress: false # queue concurrent tasks only.
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@main
            - name: Install dependencies
              run: npm ci
            - name: Snapshot currently deployed Apple configs
              run: |
                  CONFIG_VERSION=$(node --input-type=module -e "const { CURRENT_CONFIG_VERSION } = await import('./constants.js'); console.log(CURRENT_CONFIG_VERSION);")
                  mkdir -p "previous-generated/v${CONFIG_VERSION}"

                  for CONFIG in ios-config.json macos-config.json; do
                    URL="https://staticcdn.duckduckgo.com/trackerblocking/config/v${CONFIG_VERSION}/${CONFIG}"
                    OUTPUT="previous-generated/v${CONFIG_VERSION}/${CONFIG}"
                    HTTP_STATUS=$(curl --silent --show-error --location --retry 3 --output "$OUTPUT" --write-out '%{http_code}' "$URL")

                    case "$HTTP_STATUS" in
                      200)
                        ;;
                      404)
                        echo "$CONFIG has not previously been deployed for config v${CONFIG_VERSION}; treating it as changed."
                        rm -f "$OUTPUT"
                        ;;
                      *)
                        echo "Failed to snapshot $CONFIG: HTTP $HTTP_STATUS" >&2
                        exit 1
                        ;;
                    esac
                  done
            - uses: ./
            - name: Run tests
              run: npm run test
            - name: Detect changed deployed Apple configs
              id: detect-changed-configs
              run: |
                  CHANGED=$(node .github/scripts/detect-changed-configs.js previous-generated generated ios-config.json macos-config.json)
                  echo "Changed Apple configs: $CHANGED"
                  echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
            - uses: jakejarvis/s3-sync-action@7ed8b112447abb09f1da74f3466e4194fc7a6311
              with:
                  args: --acl public-read --follow-symlinks
              env:
                  AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
                  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  SOURCE_DIR: 'generated'
                  DEST_DIR: 'trackerblocking/config'
            - name: Set version variable
              id: version
              run: |
                  CONFIG_VERSION=$(node --input-type=module -e "const { CURRENT_CONFIG_VERSION } = await import('./constants.js'); console.log(CURRENT_CONFIG_VERSION);")
                  VERSION=$(jq -r .version "./generated/v${CONFIG_VERSION}/extension-config.json")
                  echo "VERSION=$VERSION" >> "$GITHUB_ENV"
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            - name: Generate release description file
              uses: ./scripts/
            - name: Archive Release
              uses: thedoctor0/zip-release@master
              with:
                  type: zip
                  filename: privacy-configuration.zip
                  path: generated
            - uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd
              with:
                  token: '${{ secrets.GITHUB_TOKEN }}'
                  name: 'remote-privacy-config-${{ env.VERSION }}'
                  artifacts: privacy-configuration.zip
                  tag: ${{ env.VERSION }}
                  bodyFile: etags.md

    notify-apple:
        needs: publish
        if: needs.publish.outputs.changed-configs != '[]'
        continue-on-error: true
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                platform:
                    - name: 'iOS'
                      compiled: 'ios-config.json'
                    - name: 'macOS'
                      compiled: 'macos-config.json'

        steps:
            - name: Create ${{ matrix.platform.name }} deployment notification task
              id: create-task
              if: contains(fromJSON(needs.publish.outputs.changed-configs), matrix.platform.compiled)
              uses: duckduckgo/native-github-asana-sync@v2.3
              with:
                  asana-pat: ${{ secrets.ASANA_ACCESS_TOKEN }}
                  asana-project: ${{ vars.APPLE_DEPLOYMENTS_ASANA_PROJECT_ID }}
                  asana-section: ${{ vars.APPLE_DEPLOYMENTS_SECTION_ID }}
                  asana-task-name: '${{ matrix.platform.name }} privacy config deployed (${{ needs.publish.outputs.version }})'
                  asana-task-description: |
                      ${{ matrix.platform.name }} privacy config version ${{ needs.publish.outputs.version }} was successfully deployed.
                      Commit: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
                      Release: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ needs.publish.outputs.version }}
                  action: 'create-asana-task'

            - name: Verify ${{ matrix.platform.name }} Asana notification
              if: contains(fromJSON(needs.publish.outputs.changed-configs), matrix.platform.compiled)
              env:
                  ASANA_TASK_ID: ${{ steps.create-task.outputs.taskId }}
              run: |
                  if [ -z "$ASANA_TASK_ID" ] || [ "$ASANA_TASK_ID" = "0" ]; then
                    echo "The Asana action did not return a task ID." >&2
                    exit 1
                  fi
                  echo "Asana task: $ASANA_TASK_ID"
