name: Create Deployment Notification Tasks

# Announces config deployments as Asana tasks - one task per platform whose COMPILED config
# (generated/v<N>/<platform>-config.json) actually changed in this push.
#
# Working on the compiled output, rather than the source overrides/<platform>-override.json file,
# means a rollout driven by a shared features/** file is caught too - not just direct override
# edits. This mirrors how the platform-team Mattermost notifications key off the compiled
# *-config.json names (.github/workflows/auto-notify-mattermost.yml + .github/scripts/mattermost-notify.mjs).
#
# Only Apple (iOS/macOS) is wired up today. To notify another platform, add a matrix entry below
# (name + compiled config filename + Asana project/section vars); the detect job already reports
# every changed *-config.json.

on:
    push:
        branches:
            - main
        paths:
            - 'features/**/*.json'
            - 'overrides/**/*.json'

jobs:
    detect:
        runs-on: ubuntu-latest
        outputs:
            changed: ${{ steps.detect.outputs.changed }}
        steps:
            - name: Check out current commit
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.sha }}
                  path: head

            - name: Check out previous commit
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.before }}
                  path: base

            - name: Use Node.js 20
              uses: actions/setup-node@v6
              with:
                  node-version: 20.x

            - name: Build both commits
              run: |
                  cd head
                  npm ci
                  npm run build
                  cd ..
                  cp -r head/node_modules base/node_modules
                  cd base
                  npm run build

            - name: Detect changed compiled configs
              id: detect
              run: echo "changed=$(node head/.github/scripts/detect-changed-configs.js base/generated head/generated)" >> "$GITHUB_OUTPUT"

    notify:
        needs: detect
        if: needs.detect.outputs.changed != '[]'
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                platform:
                    - name: 'iOS'
                      compiled: 'ios-config.json'
                      asana_project: '${{ vars.APPLE_DEPLOYMENTS_ASANA_PROJECT_ID }}'
                      asana_section: '${{ vars.APPLE_DEPLOYMENTS_SECTION_ID }}'
                    - name: 'macOS'
                      compiled: 'macos-config.json'
                      asana_project: '${{ vars.APPLE_DEPLOYMENTS_ASANA_PROJECT_ID }}'
                      asana_section: '${{ vars.APPLE_DEPLOYMENTS_SECTION_ID }}'

        steps:
            - name: Create ${{ matrix.platform.name }} deployment notification task
              if: contains(fromJSON(needs.detect.outputs.changed), matrix.platform.compiled)
              uses: duckduckgo/native-github-asana-sync@v2.3
              with:
                  asana-pat: ${{ secrets.ASANA_ACCESS_TOKEN }}
                  asana-project: ${{ matrix.platform.asana_project }}
                  asana-section: ${{ matrix.platform.asana_section }}
                  asana-task-name: '${{ matrix.platform.name }} privacy config deployed'
                  asana-task-description: |
                      ${{ matrix.platform.name }} privacy config deployed.
                      Commit: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
                  action: 'create-asana-task'
